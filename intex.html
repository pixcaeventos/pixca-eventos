<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIXCA Eventos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f7f7f7;
}

.hero{
height:350px;
background:linear-gradient(rgba(0,0,0,.5),
rgba(0,0,0,.5)),
url("https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=1600");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:20px;
}

.hero h1{
font-size:4rem;
margin-bottom:10px;
}

.hero p{
font-size:1.3rem;
}

.container{
max-width:900px;
margin:-50px auto 50px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:30px;
}

.card{
padding:20px;
border:2px solid #ddd;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card.selected{
border:2px solid #000;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

input:focus,
select:focus{
outline:none;
border-color:#888;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

#mensaje{
display:none;
padding:15px;
margin-top:20px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<section class="hero">
<h1>PIXCA Eventos</h1>
<p>Creamos experiencias inolvidables</p>
</section>

<div class="container">

<h2>Solicitud de Evento</h2>

<div class="cards">

<div class="card" data-evento="boda">
💍
<br><br>
Boda
</div>

<div class="card" data-evento="xv">
👑
<br><br>
XV Años
</div>

<div class="card" data-evento="bautizo">
👶
<br><br>
Bautizo
</div>

<div class="card" data-evento="corporativo">
🏢
<br><br>
Corporativo
</div>

</div>

<form id="formulario">

<input
type="text"
id="nombre"
placeholder="Nombre completo"
required>

<input
type="tel"
id="telefono"
placeholder="Teléfono"
required>

<input
type="email"
id="correo"
placeholder="Correo electrónico"
required>

<label>Fecha del Evento</label>

<input
type="date"
id="fechaEvento"
required>

<input
type="number"
id="invitados"
placeholder="Número estimado de invitados"
required>

<select id="tipoEvento" required>

<option value="">
Seleccione un evento
</option>

<option value="boda">
Boda
</option>

<option value="xv">
XV Años
</option>

<option value="bautizo">
Bautizo
</option>

<option value="corporativo">
Corporativo
</option>

</select>

<button type="submit">
Enviar Solicitud
</button>

</form>

<div id="mensaje">
✅ Información enviada correctamente
</div>

</div>

<script>

const URL_SCRIPT =
"https://script.google.com/macros/s/AKfycbwKUkRZ0joFOnfgP-b6uELLlPXthedDo8foeBI-oZfbRsFMEYzlfiNh-h6iWd9NbYRhtg/exec";

const cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

card.addEventListener("click",()=>{

cards.forEach(c=>
c.classList.remove("selected")
);

card.classList.add("selected");

document.getElementById("tipoEvento").value =
card.dataset.evento;

});

});

document
.getElementById("formulario")
.addEventListener("submit",
async function(e){

e.preventDefault();

const datos={

nombre:
document.getElementById("nombre").value,

telefono:
document.getElementById("telefono").value,

correo:
document.getElementById("correo").value,

fechaEvento:
document.getElementById("fechaEvento").value,

invitados:
document.getElementById("invitados").value,

tipoEvento:
document.getElementById("tipoEvento").value

};

try{

await fetch(URL_SCRIPT,{
method:"POST",
body:JSON.stringify(datos)
});

document
.getElementById("mensaje")
.style.display="block";

setTimeout(()=>{

switch(datos.tipoEvento){

case "boda":
window.location.href=
"https://docs.google.com/forms/d/e/1FAIpQLScEwwbL3RJI4KIxUhzIMqdwmxUSbPlMw2EfY3Xd7PZ903ESdQ/viewform";
break;

case "xv":
window.location.href=
"https://docs.google.com/forms/d/e/1FAIpQLSdYTfh7QczYm0yx0Zdw2If_8X-b3R5lIm9kuxKczPFVKXJ4xA/viewform?usp=publish-editor";
break;

case "bautizo":
window.location.href=
"https://docs.google.com/forms/d/e/1FAIpQLSdo-iqip32UgOWhXiyzsSj9r1OkI-PKL8FJmGnJbPJXQArULQ/viewform?usp=publish-editor";
break;

case "corporativo":
window.location.href=
"https://docs.google.com/forms/d/e/1FAIpQLSfMb_9waFhCHMOch5XCHLkO7v6WXKDoiEL747bnhlW8sBrTDg/viewform?usp=publish-editor";
break;

}

},1500);

}
catch(error){

alert(
"Error al guardar información"
);

console.error(error);

}

});

</script>

</body>
</html>
